<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI图文创作 - 豆豆</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="page">
      <div class="layout">
        <!-- 左侧边栏 -->
        <aside class="sidebar">
          <section>
            <h2>采集时间范围</h2>
            <div class="date-range-fields">
              <label class="date-field">
                <span>开始日期</span>
                <input id="date-start" type="date" class="input input-full" />
              </label>
              <label class="date-field">
                <span>结束日期</span>
                <input id="date-end" type="date" class="input input-full" />
              </label>
            </div>
          </section>
          <section>
            <div class="section-header">
              <h2>分组</h2>
              <button
                class="btn btn-primary"
                id="add-group"
                style="font-size: 13px; padding: 6px 16px"
              >
                添加分组
              </button>
            </div>
            <div id="group-list">
              <!-- 动态渲染分组名称列表 -->
            </div>
            <div class="empty-state hidden" id="empty-groups">
              <p>暂无分组，点击「添加分组」开始配置</p>
            </div>
          </section>
        </aside>

        <!-- 右侧内容区 -->
        <main class="main-content">
          <div id="group-detail">
            <!-- 选中分组的详细内容 -->
          </div>
          <div class="empty-state" id="empty-detail">
            <p>请选择左侧分组查看详情</p>
          </div>
        </main>
      </div>
    </div>

    <script type="module" src="index.js"></script>
  </body>
</html>
